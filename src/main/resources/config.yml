# -------------------------------------------------------------
# LuminaCore Config - การตั้งค่าส่วนกลาง
# -------------------------------------------------------------

# การตั้งค่าทั่วไปของระบบ
settings:
  prefix: "[LuminaCore]"
  timezone: "Asia/Bangkok"
  time-format: "dd/MM/yyyy HH:mm:ss"
  
  # คีย์ยืนยันสิทธิ์เครื่องแม่ข่าย (ได้รับจากระบบจัดการคีย์)
  # ฟอร์แมตคีย์: LUM-XXXX-XXXX-XXXX
  license-key: ""

# การตั้งค่าคีย์ลัดการกดย่อตัวเริ่มต้น
shortcut:
  # หากตั้งเป็น true ทุกระบบย่อยจะอิงค่ากดย่อและเวลารีเซ็ตจากที่นี่เท่านั้น (ต่อให้ระบบย่อยจะตั้งค่าแยกต่างหากก็ตาม)
  override-global: false
  required-sneaks: 10
  reset-interval: 2.5

# การตั้งค่าแชร์ Discord Webhook สำหรับแจ้งเตือนระบบ
webhook:
  url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_URL"
  username: "LuminaCore Notifier"
  avatar-url: "https://cdn.discordapp.com/attachments/123456789/avatar.png"

# ข้อความแจ้งเตือนต่างๆ ของระบบหลัก (หลีกเลี่ยงการใช้อิโมจิ)
messages:
  no-permission: "%prefix% คุณไม่มีสิทธิ์ในการใช้งานคำสั่งนี้"
  only-players: "%prefix% คำสั่งนี้ใช้งานได้เฉพาะผู้เล่นเท่านั้น"
  plugin-reloaded: "%prefix% รีโหลดคอนฟิกและโมดูลของปลั๊กอินเรียบร้อยแล้ว"
  gui-title: "โมดูล LuminaCore"
  gui-module-enabled: "%prefix% เปิดใช้งานโมดูล %module% เรียบร้อยแล้ว"
  gui-module-disabled: "%prefix% ปิดใช้งานโมดูล %module% เรียบร้อยแล้ว"
  gui-click-to-toggle: "&7คลิกเพื่อเปิด/ปิดสถานะโมดูล"
  gui-status-enabled: "&aสถานะ: เปิดใช้งาน"
  gui-status-disabled: "&cสถานะ: ปิดใช้งาน"
  
  # ข้อความแจ้งเตือนอัปเดตสำหรับแอดมินตอนเข้าเซิร์ฟเวอร์
  update-detected: "%prefix% &aตรวจพบเวอร์ชันใหม่ล่าสุด! &e(%latest_version%)"
  update-current: "%prefix% &7เวอร์ชันปัจจุบันของคุณคือ: &c(v%current_version%)"
  update-download: "%prefix% &aดาวน์โหลดเวอร์ชันใหม่ได้ที่: &b%url%"
  
  # ข้อความแสดงสถานะการโหลดโมดูลใน Console
  module-enabled: "Module %module% enabled."
  module-disabled: "Module %module% is disabled."


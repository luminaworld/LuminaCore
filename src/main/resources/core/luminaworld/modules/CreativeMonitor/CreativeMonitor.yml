# -------------------------------------------------------------
# Creative Monitor - Module Configuration
# -------------------------------------------------------------

# Module Settings
settings:
  enabled: true
  
  # Cooldown in seconds between sending notifications per player
  cooldown: 3

  # Enable/disable specific detections
  track-item-obtain: true
  track-item-drop: true

  # Dedicated Discord Webhook URL for Creative Monitor
  # (If empty, it falls back to shared webhook URL in config.yml)
  discord-webhook-url: ""

# Message notification format. Options: Embed1, Embed2, normal
messages: "Embed1"

# Creative Obtain Notification
ObtainEmbed:
  content: ""
  setTitle: "%prefix% Creative Item Obtained"
  setDescription: "A player in creative mode spawned an item."
  setColor: 3447003  # Blue (decimal color code)
  setThumbnail: "%player_avatar%"
  setTimestamp: true
  setFooter: "LuminaCore Creative Monitor"
  fields:
    field1:
      name: "Player"
      value: "%player_name%"
      inline: true
    field2:
      name: "Item Obtained"
      value: "%item_type% (x%item_amount%)"
      inline: true
    field3:
      name: "Location"
      value: "X: %player_x% Y: %player_y% Z: %player_z%"
      inline: true

# Creative Drop Notification
DropEmbed:
  content: ""
  setTitle: "%prefix% Creative Item Dropped"
  setDescription: "A player in creative mode dropped an item."
  setColor: 15158332  # Red
  setThumbnail: "%player_avatar%"
  setTimestamp: true
  setFooter: "LuminaCore Creative Monitor"
  fields:
    field1:
      name: "Player"
      value: "%player_name%"
      inline: true
    field2:
      name: "Item Dropped"
      value: "%item_type% (x%item_amount%)"
      inline: true
    field3:
      name: "Location"
      value: "X: %block_x% Y: %block_y% Z: %block_z%"
      inline: true

normal:
  obtain: "%prefix% Player %player_name% spawned %item_type% (x%item_amount%) in Creative Mode at %time%"
  drop: "%prefix% Player %player_name% dropped %item_type% (x%item_amount%) in Creative Mode at %block_x%, %block_y%, %block_z% in world %world_name% at %time%"

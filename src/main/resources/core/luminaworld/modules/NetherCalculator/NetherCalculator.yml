settings:
  enabled: true
  message-style: "ACTIONBAR"
  use-permission: false
  permission: "luminacore.module.nethercalculator"
  required-sneaks: 10
  reset-interval: 2.5

messages:
  overworld-to-nether: "%prefix% &eNether Equivalent: &aX=%x%, Z=%z%"
  nether-to-overworld: "%prefix% &eOverworld Equivalent: &aX=%x%, Z=%z%"
  invalid-world: "%prefix% &cYou can only use this in Overworld or Nether."

settings:
  enabled: true
  message-style: "ACTIONBAR"
  use-permission: false
  permission: "luminacore.module.timeweatherviewer"
  required-sneaks: 10
  reset-interval: 2.5

messages:
  info: "%prefix% &eTime: &a%time% &7| &eWeather: &a%weather%"
  weather-clear: "Clear"
  weather-rain: "Rain"
  weather-thunder: "Thunder"

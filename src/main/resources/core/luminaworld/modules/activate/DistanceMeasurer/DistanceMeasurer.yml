# =========================================================================
# DistanceMeasurer (ระบบวัดระยะทางระหว่างบล็อก)
# คำอธิบาย: ระบบสำหรับวัดระยะห่างระหว่างบล็อก 2 จุดในเซิร์ฟเวอร์ โดยจะคำนวณทั้งแบบ
# Euclidean Distance (ระยะทางทแยงตรง 3 มิติ) และ Manhattan Distance (ระยะการเดินเป็นบล็อก)
# วิธีการใช้งาน:
# 1. ถือเข็มทิศในมือแล้วกดย่อตัว (Sneak) + คลิกขวา เพื่อเปิดโหมดวัดระยะทาง
# 2. คลิกขวาที่บล็อกที่ 1 และ คลิกขวาที่บล็อกที่ 2 ระบบจะแสดงผลต่างระยะทางให้เห็นทันที
# =========================================================================
settings:
  # การตั้งค่าพื้นฐานโมดูล
  enabled: true
  system-name: "ระบบวัดระยะทาง"
  use-permission: false
  permission: "luminacore.module.distancemeasurer"

  # การตั้งค่าตัวย่อเพื่อกระตุ้นโหมดทำงาน
  required-sneaks: 1
  reset-interval: 2.5
  cooldown: 3.0

  # การตั้งค่าหลอดความก้าวหน้า (Progress Bar)
  # (หมายเหตุ: DistanceMeasurer ใช้งานทางลัด Shift + คลิกขวา จึงไม่ได้แสดงหลอดสะสมย่อตัว แต่ใส่โครงสร้างไว้เพื่อความสอดคล้อง)
  progress-bar:
    enabled: false
    char-completed: "|"
    char-remaining: "|"
    color-completed: "&a"
    color-remaining: "&7"
    color-bracket: "&e"
    color-number: "&b"
    color-text: "&7"
    format: "%color_text%(ย่ออีก %needed% ครั้งเพื่อใช้ %system%) %color_number%%count%/%total% %color_bracket%[ %completed%%remaining% %color_bracket%]"

  # การตั้งค่าระบบเสียง (Audio Settings)
  # - tick-sound: ชื่อเสียงคลิกจุดสะสม (ไม่ได้ประมวลผลผ่าน tick-sound ในโมดูลนี้)
  # - success-sound: ชื่อเสียงเมื่อสลับเปิด/ปิดโหมดวัดระยะทางสำเร็จ
  # - success-volume: ความดังเสียงสลับโหมด
  # - success-pitch: คีย์ระดับเสียงสลับโหมด
  audio:
    enabled: true
    tick-enabled: false
    success-enabled: true
    tick-sound: "BLOCK_NOTE_BLOCK_PLING"
    tick-volume: 0.5
    tick-pitch-start: 1.0
    tick-pitch-end: 1.0
    success-sound: "minecraft:entity.ender_eye.death"
    success-volume: 0.8
    success-pitch: 1.0

  # รูปแบบการแจ้งเตือนข้อความ (message-style)
  # เลือกได้ 3 รูปแบบ:
  # - CHAT      : แสดงข้อความทางช่องพูดคุยปกติ
  # - ACTIONBAR : แสดงข้อความเหนือแถบทางลัดปุ่มไอเทม
  # - NONE      : ปิดการแจ้งเตือนทั้งหมดอย่างสมบูรณ์แบบ (จะไม่แสดงข้อความแจ้งเตือนเลย)
  message-style: "ACTIONBAR"
  actionbar-duration: 4.0

# Placeholders ที่สามารถใช้งานในข้อความ:
# - %prefix%: คำนำหน้าของปลั๊กอิน (จาก config.yml หลัก)
# - %x%: พิกัดแกน X ของจุดที่คลิกเลือก
# - %y%: พิกัดแกน Y ของจุดที่คลิกเลือก
# - %z%: พิกัดแกน Z ของจุดที่คลิกเลือก
# - %dist%: ระยะทางตรงในแบบเส้นทแยงมุม 3 มิติ (Euclidean Distance มีทศนิยม 2 ตำแหน่ง)
# - %manhattan%: ระยะทางรวมผลต่างพิกัดตามแนวเดินบล็อก (Manhattan Distance)
messages:
  mode-enabled: "%prefix% &aเปิดใช้งานโหมดวัดระยะทางแล้ว! คลิกขวาที่บล็อกเพื่อกำหนดจุด"
  mode-disabled: "%prefix% &cปิดใช้งานโหมดวัดระยะทางแล้ว!"
  point-1: "%prefix% &aกำหนดจุดที่ 1 ที่พิกัด: &eX=%x%, Y=%y%, Z=%z%"
  point-2: "%prefix% &aกำหนดจุดที่ 2 ที่พิกัด: &eX=%x%, Y=%y%, Z=%z%"
  result: "%prefix% &bระยะทางหลัก: &e%main_dist% บล็อก&7%offset% &7(&fทแยง: &e%dist% บล็อก&7)"

  # การตั้งค่าข้อความระบุระยะเบี่ยง (Offsets) เพื่อไม่ให้มี Hardcoded text ในโค้ด
  offsets:
    aligned: " (ตรงแนวพอดี)"
    prefix: " | "
    separator: ", "
    left: "ซ้าย"
    right: "ขวา"
    above: "สูงกว่า"
    below: "ต่ำกว่า"
    east: "ตะวันออก"
    west: "ตะวันตก"
    north: "เหนือ"
    south: "ใต้"
    format-side: "ห่างออกไปทาง%dir% %amount% บล็อก"
    format-height: "%dir% %amount% บล็อก"
    format-axis-x: "ห่างแกน X %amount% บล็อก (%dir%)"
    format-axis-z: "ห่างแกน Z %amount% บล็อก (%dir%)"



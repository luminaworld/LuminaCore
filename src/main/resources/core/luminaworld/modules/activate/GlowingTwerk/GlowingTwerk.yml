# =========================================================================
# GlowingTwerk (ระบบย่อตัวเพื่อเร่งโตพืช - Twerk)
# คำอธิบาย: ระบบสุดล้ำที่ช่วยให้ผู้เล่นสามารถเร่งการเจริญเติบโตของพืช Saplings เห็ด และเนเธอร์วาร์ต
# ในรัศมีรอบตัวผู้เล่นได้โดยการกดย่อตัว (Twerk) ถี่ๆ
# ระบบจะสแกนพืชรอบๆ และมีโอกาสเร่งการเจริญเติบโตพร้อมเอฟเฟกต์แสงและเสียงอย่างตระการตา
# =========================================================================
settings:
  # การตั้งค่าพื้นฐานโมดูล
  enabled: true

  # การตั้งค่าฟีเจอร์เร่งโตพืช
  cooldown: 5.0 # คูลดาวน์การใช้งานระหว่างเร่งโตพืชแต่ละครั้ง (วินาที - รองรับทศนิยม เช่น 1.5, 2.5)
  growth-chance: 50.0 # โอกาสสำเร็จในการเร่งโตพืช (เปอร์เซ็นต์ตั้งแต่ 0.0 - 100.0)
  max-radius: 32 # รัศมีสูงสุดในการเร่งโตพืชรอบตัวผู้เล่น (บล็อก)
  
  # รายชื่อโลกที่อนุญาตให้ใช้งานระบบนี้ (เว้นว่าง [] เพื่อเปิดใช้ในทุกโลก)
  allowed-worlds:
    - "world"
    - "world_nether"
    - "world_the_end"

  # เอฟเฟกต์อนุภาค (Particles)
  particles:
    enabled: true
    type: "HAPPY_VILLAGER" # ชนิดของอนุภาคที่จะแสดงเมื่อพืชโต (ต้องพิมพ์ชื่อตาม Bukkit Particle Enum)
    count: 10 # จำนวนอนุภาคที่จะสปอนรอบบล็อกพืชที่โตสำเร็จ

  # การตั้งค่าเสียงและการแสดงผล
  sound-enabled: true # เปิด/ปิดเสียงเอฟเฟกต์
  chat-messages-enabled: true # เปิด/ปิดการส่งข้อความยืนยันความก้าวหน้าทางแชท

  # ระยะเวลาการแสดงข้อความกรณีแสดงผลบน ActionBar (วินาที)
  actionbar-duration: 4.0

# ข้อความแจ้งเตือนต่างๆ (หลีกเลี่ยงการใช้อิโมจิ)
messages:
  success: "%prefix% &aคุณได้ช่วยเร่งพืชรอบตัวให้เติบโตสำเร็จจำนวน {count} ต้น!"
  cooldown: "%prefix% &cโปรดรอก่อนใช้พลังเร่งโตพืชอีกครั้ง!"
  no-permission: "%prefix% &cคุณไม่มีสิทธิ์ในการใช้งานระบบเร่งโตพืช!"
  world-disabled: "%prefix% &cระบบเร่งโตพืชไม่ได้รับอนุญาตให้ใช้ในโลกนี้!"

# รายชื่อชนิดของบล็อกพืชที่เร่งโตได้ (ต้องตรงตามชื่อ Bukkit Material)
growable-blocks:
  - "WHEAT"
  - "CARROTS"
  - "POTATOES"
  - "BEETROOTS"
  - "NETHER_WART"
  - "COCOA"
  - "OAK_SAPLING"
  - "BIRCH_SAPLING"
  - "SPRUCE_SAPLING"
  - "JUNGLE_SAPLING"
  - "ACACIA_SAPLING"
  - "DARK_OAK_SAPLING"
  - "CHERRY_SAPLING"
  - "MANGROVE_PROPAGULE"
  - "BAMBOO"
  - "BAMBOO_SAPLING"
  - "SUGAR_CANE"
  - "CACTUS"
  - "KELP"
  - "KELP_PLANT"
  - "CHORUS_FLOWER"
  - "SWEET_BERRY_BUSH"
  - "MELON_STEM"
  - "PUMPKIN_STEM"
  - "BROWN_MUSHROOM"
  - "RED_MUSHROOM"
  - "CRIMSON_FUNGUS"
  - "WARPED_FUNGUS"

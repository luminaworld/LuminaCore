# =========================================================================
# GlowingTwerk (ระบบย่อตัวเพื่อเร่งโตพืช - Twerk)
# คำอธิบาย: ระบบสุดล้ำที่ช่วยให้ผู้เล่นสามารถเร่งการเจริญเติบโตของพืช Saplings เห็ด และเนเธอร์วาร์ต
# ในรัศมีรอบตัวผู้เล่นได้โดยการกดย่อตัว (Twerk) ถี่ๆ
# ระบบจะสแกนพืชรอบๆ และมีโอกาสเร่งการเจริญเติบโตพร้อมเอฟเฟกต์แสงและเสียงอย่างตระการตา
# =========================================================================
settings:
  enabled: true
  
  # คูลดาวน์การใช้งานระหว่างเร่งโตพืชแต่ละครั้ง (วินาที - รองรับทศนิยม เช่น 1.5, 2.5)
  cooldown: 5.0
  
  # โอกาสสำเร็จในการเร่งโตพืช (เปอร์เซ็นต์ตั้งแต่ 0.0 - 100.0)
  growth-chance: 50.0
  
  # เปิด/ปิดเอฟเฟกต์อนุภาค (Particle)
  particle-enabled: true
  
  # จำนวนอนุภาคที่จะสปอนรอบบล็อกพืชที่โตสำเร็จ
  particle-amount: 10
  
  # เปิด/ปิดเสียงเอฟเฟกต์
  sound-enabled: true
  
  # เปิด/ปิดการส่งข้อความยืนยันความก้าวหน้าทางแชท
  chat-messages-enabled: true
  
  # รัศมีสูงสุดในการเร่งโตพืชรอบตัวผู้เล่น (บล็อก)
  max-radius: 32
  
  # ชนิดของอนุภาคที่จะแสดงเมื่อพืชโต (ต้องพิมพ์ชื่อตาม Bukkit Particle Enum)
  particle: "HAPPY_VILLAGER"
  
  # รายชื่อโลกที่อนุญาตให้ใช้งานระบบนี้ (เว้นว่าง [] เพื่อเปิดใช้ในทุกโลก)
  allowed-worlds:
    - "world"
    - "world_nether"
    - "world_the_end"

# Customizable messages (No emojis)
messages:
  success: "%prefix% You grew {count} plants using Luminaris power!"
  cooldown: "%prefix% Please wait before using Luminaris power again!"
  no-permission: "%prefix% You do not have permission to use Glowing Twerk!"
  world-disabled: "%prefix% Glowing Twerk is not allowed in this world!"

# List of growable block types (Must match Bukkit Material names)
growable-blocks:
  - "WHEAT"
  - "CARROTS"
  - "POTATOES"
  - "BEETROOTS"
  - "NETHER_WART"
  - "COCOA"
  - "OAK_SAPLING"
  - "BIRCH_SAPLING"
  - "SPRUCE_SAPLING"
  - "JUNGLE_SAPLING"
  - "ACACIA_SAPLING"
  - "DARK_OAK_SAPLING"
  - "CHERRY_SAPLING"
  - "MANGROVE_PROPAGULE"
  - "BAMBOO"
  - "BAMBOO_SAPLING"
  - "SUGAR_CANE"
  - "CACTUS"

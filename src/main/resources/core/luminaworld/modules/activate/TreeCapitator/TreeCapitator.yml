# =========================================================================
# TreeCapitator (ระบบตัดไม้หมดต้น)
# คำอธิบาย: ระบบที่เพิ่มความสะดวกสบายในการทำฟาร์มไม้
# เมื่อเปิดโหมดนี้และใช้ขวานตัดบล็อกไม้ (Log) ระบบจะสแกนและทำลายบล็อกไม้ทั้งหมดในต้นไม้
# รวมถึงสามารถเลือกทำลายใบไม้รอบๆ และปลูกต้นอ่อนคืนสู่ดินด้านล่างสุดโดยอัตโนมัติได้
# วิธีการใช้งาน: ถือขวาน (Axe) ในมือหลักแล้วกดย่อตัวสะสมครบจำนวนเพื่อเปิด/ปิดโหมดทำงาน
# =========================================================================
settings:
  # การตั้งค่าพื้นฐานโมดูล
  enabled: true
  system-name: "ระบบตัดไม้หมดต้น"
  use-permission: false
  permission: "luminacore.module.treecapitator"

  # การตั้งค่าตัวย่อเพื่อกระตุ้นโหมดทำงาน
  required-sneaks: 10
  reset-interval: 2.5
  cooldown: 3.0

  # การตั้งค่าฟีเจอร์การตัดไม้
  max-blocks: 128
  break-leaves: true
  replant-sapling: true


  # ขวานที่อนุญาตให้ใช้งานระบบตัดไม้หมดต้นได้
  # หากระบุเป็นลิสต์ว่าง [] หรือมี "*" จะสามารถใช้ขวานระดับใดตัดก็ได้
  allowed-axes:
    - "WOODEN_AXE"
    - "STONE_AXE"
    - "COPPER_AXE"
    - "IRON_AXE"
    - "GOLDEN_AXE"
    - "DIAMOND_AXE"
    - "NETHERITE_AXE"

  # ชนิดของบล็อกไม้ที่อนุญาตให้ใช้ระบบตัดไม้หมดต้นได้
  # หากระบุเป็นลิสต์ว่าง [] หรือมี "*" จะสามารถตัดไม้ประเภทใดก็ได้
  allowed-blocks:
    - "OAK_LOG"
    - "OAK_WOOD"
    - "SPRUCE_LOG"
    - "SPRUCE_WOOD"
    - "BIRCH_LOG"
    - "BIRCH_WOOD"
    - "JUNGLE_LOG"
    - "JUNGLE_WOOD"
    - "ACACIA_LOG"
    - "ACACIA_WOOD"
    - "DARK_OAK_LOG"
    - "DARK_OAK_WOOD"
    - "MANGROVE_LOG"
    - "MANGROVE_WOOD"
    - "CHERRY_LOG"
    - "CHERRY_WOOD"
    - "PALE_OAK_LOG"
    - "PALE_OAK_WOOD"
    - "CRIMSON_STEM"
    - "CRIMSON_HYPHAE"
    - "WARPED_STEM"
    - "WARPED_HYPHAE"
    - "BAMBOO_BLOCK"

  # การตั้งค่าหลอดความก้าวหน้า (Progress Bar)
  # Placeholders ที่สามารถใช้งานใน format:
  # - %completed%: ขีดความก้าวหน้าที่ย่อสำเร็จแล้ว (สร้างจาก color-completed และ char-completed)
  # - %remaining%: ขีดความก้าวหน้าที่เหลืออยู่ (สร้างจาก color-remaining และ char-remaining)
  # - %count%: จำนวนครั้งที่กดย่อสำเร็จในปัจจุบัน
  # - %total%: จำนวนครั้งทั้งหมดที่ต้องการ
  # - %needed%: จำนวนครั้งที่ยังต้องกดเพิ่มเพื่อเปิดใช้งาน
  # - %system%: ชื่อภาษาไทยของระบบย่อย (แสดง "ระบบตัดไม้หมดต้น")
  # - %prefix%: คำนำหน้าของปลั๊กอิน (จาก config.yml หลัก)
  # - %color_bracket%: รหัสสีของวงเล็บครอบหลอด
  # - %color_number%: รหัสสีของตัวเลขระบุความก้าวหน้า
  # - %color_text%: รหัสสีของคำอธิบาย
  progress-bar:
    enabled: true
    char-completed: "|"
    char-remaining: "|"
    color-completed: "&a"
    color-remaining: "&7"
    color-bracket: "&e"
    color-number: "&b"
    color-text: "&7"
    format: "%color_text%(ย่ออีก %needed% ครั้งเพื่อใช้ %system%) %color_number%%count%/%total% %color_bracket%[ %completed%%remaining% %color_bracket%]"

  # การตั้งค่าระบบเสียง (Audio Settings)
  # - tick-sound: ชื่อเสียงระหว่างกดย่อสะสม (เช่น BLOCK_NOTE_BLOCK_PLING, BLOCK_NOTE_BLOCK_BIT ฯลฯ)
  # - tick-volume: ความดังของเสียงสะสม (0.0 - 1.0)
  # - tick-pitch-start: คีย์ระดับเสียงเริ่มแรก (0.5 - 2.0)
  # - tick-pitch-end: คีย์ระดับเสียงสูงสุดเมื่อเต็ม (0.5 - 2.0)
  # - success-sound: ชื่อเสียงตอนปลดล็อกสำเร็จ (เช่น ENTITY_PLAYER_LEVELUP, BLOCK_BEACON_ACTIVATE)
  # - success-volume: ความดังของเสียงสำเร็จ (0.0 - 1.0)
  # - success-pitch: คีย์ระดับเสียงสำเร็จ (0.5 - 2.0)
  audio:
    enabled: true
    tick-enabled: false
    success-enabled: true
    tick-sound: "BLOCK_NOTE_BLOCK_PLING"
    tick-volume: 0.5
    tick-pitch-start: 0.5
    tick-pitch-end: 2.0
    success-sound: "minecraft:entity.ender_eye.death"
    success-volume: 0.8
    success-pitch: 1.0

  # รูปแบบการแจ้งเตือนข้อความ (message-style)
  # เลือกได้ 3 รูปแบบ:
  # - CHAT      : แสดงข้อความทางช่องพูดคุยปกติ
  # - ACTIONBAR : แสดงข้อความเหนือแถบทางลัดปุ่มไอเทม
  # - NONE      : ปิดการแจ้งเตือนทั้งหมดอย่างสมบูรณ์แบบ (จะไม่แสดงข้อความแจ้งเตือนเลย)
  message-style: "ACTIONBAR"
  actionbar-duration: 4.0

# Placeholders ที่สามารถใช้งานในข้อความ:
# - %prefix%: คำนำหน้าของปลั๊กอิน (จาก config.yml หลัก)
messages:
  mode-enabled: "%prefix% &aเปิดใช้งานระบบตัดไม้หมดต้นเรียบร้อยแล้ว!"
  mode-disabled: "%prefix% &cปิดใช้งานระบบตัดไม้หมดต้นแล้ว!"
  timeout-disabled: "%prefix% &cหมดเวลาตัดไม้! กรุณาย่อใหม่อีกครั้ง"

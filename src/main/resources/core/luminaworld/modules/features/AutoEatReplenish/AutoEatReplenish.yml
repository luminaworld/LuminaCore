# =========================================================================
# AutoEatReplenish (ระบบเติมอาหารในมือหลักอัตโนมัติ)
# คำอธิบาย: ระบบที่เพิ่มความสะดวกสบายเมื่อกินอาหารหมดชิ้นสุดท้าย
# ระบบจะค้นหาอาหารชนิดเดียวกัน หรืออาหารทดแทนที่มีประโยชน์ตามลำดับความสำคัญในกระเป๋า (Inventory)
# แล้วนำมาใส่ไว้ในมือหลักทันทีโดยอัตโนมัติ พร้อมทั้งมีฟังก์ชันบล็อกรายการอาหารมีพิษที่เป็นอันตราย
# =========================================================================
settings:
  # การตั้งค่าพื้นฐานโมดูล
  enabled: true
  use-permission: false
  permission: "luminacore.feature.autoeatreplenish"

  # ลำดับความสำคัญการค้นหาอาหารสำรอง (หากชนิดเดิมหมด จะค้นตามลำดับนี้ก่อน)
  fallback-priority:
    - "COOKED_BEEF"
    - "COOKED_PORKCHOP"
    - "GOLDEN_CARROT"
    - "BAKED_POTATO"
    - "BREAD"
    - "COOKED_CHICKEN"
    - "COOKED_MUTTON"
    - "COOKED_RABBIT"
    - "COOKED_COD"
    - "COOKED_SALMON"
    - "APPLE"

  # การจัดการอาหารที่ไม่ปลอดภัย (อาหารที่อาจทำให้ติดสถานะผิดปกติ)
  allow-unsafe-food: false # เปิด/ปิด การอนุญาตให้เติมอาหารที่เป็นอันตราย (หากเป็น false จะเลือกเฉพาะอาหารปลอดภัย)
  unsafe-food-blacklist:
    - "ROTTEN_FLESH"      # เนื้อเน่า (ทำให้หิวโซ)
    - "SPIDER_EYE"        # ตาสไปเดอร์ (ทำให้ติดพิษ)
    - "PUFFERFISH"        # ปลาปักเป้า (ทำให้ติดพิษ คลื่นไส้ หิวโซ)
    - "POISONOUS_POTATO"  # มันฝรั่งพิษ (ทำให้ติดพิษ)
    - "CHICKEN"           # ไก่ดิบ (มีโอกาสหิวโซ)
    - "CHORUS_FRUIT"      # ผลไม้คอรัส (เทเลพอร์ตสุ่ม)

  # การตั้งค่าเสียงเวลาทำงาน
  audio:
    enabled: true
    sound: "ENTITY_ITEM_PICKUP"
    volume: 0.5
    pitch: 1.0

  # รูปแบบการแจ้งเตือนข้อความ (message-style)
  # เลือกได้ 3 รูปแบบ:
  # - CHAT      : แสดงข้อความทางช่องพูดคุยปกติ
  # - ACTIONBAR : แสดงข้อความเหนือแถบทางลัดปุ่มไอเทม
  # - NONE      : ปิดการแจ้งเตือนทั้งหมดอย่างสมบูรณ์แบบ (จะไม่แสดงข้อความแจ้งเตือนเลย)
  message-style: "ACTIONBAR"

# ข้อความแจ้งเตือนต่างๆ (หลีกเลี่ยงการใช้อิโมจิ)
messages:
  replenished: "%prefix% &eเติมอาหารในมือด้วย %item% ให้โดยอัตโนมัติแล้ว!"

# รายการตัวแปร (Placeholders) ที่ใช้ได้:
# %item% - ชื่อไอเทมอาหารที่ถูกดึงเข้ามาในมือหลัก
# %prefix% - คำนำหน้าปลั๊กอิน (จาก config.yml หลัก)

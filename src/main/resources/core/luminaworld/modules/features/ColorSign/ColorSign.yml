# การตั้งค่า ColorSign (ระบบเขียนป้ายตัวอักษรสี)
settings:
  enabled: true
  use-permission: true
  permission: "luminacore.feature.colorsign"
  # รูปแบบการแจ้งเตือนข้อความ (message-style)
  # เลือกได้ 3 รูปแบบ:
  # - CHAT      : แสดงข้อความทางช่องพูดคุยปกติ
  # - ACTIONBAR : แสดงข้อความเหนือแถบทางลัดปุ่มไอเทม
  # - NONE      : ปิดการแจ้งเตือนทั้งหมดอย่างสมบูรณ์แบบ (จะไม่แสดงข้อความแจ้งเตือนเลย)
  message-style: "CHAT"
  
  allow-hex: true # เปิด/ปิด การใช้รหัสสีแบบ Hex เช่น &#FF5555
  allow-minimessage: true # เปิด/ปิด การใช้สัญลักษณ์สีแบบ MiniMessage เช่น <gradient:red:blue>
  allow-legacy: true # เปิด/ปิด การใช้รหัสสีแบบดั้งเดิม เช่น &a, &l

  audio:
    enabled: true
    sound: "ENTITY_ITEM_FRAME_ADD_ITEM"
    volume: 1.0
    pitch: 1.2

messages:
  formatted: "%prefix% &aจัดรูปแบบตัวอักษรป้ายสำเร็จแล้ว!"

# รายการตัวแปร (Placeholders) ที่ใช้ได้:
# %prefix% - ข้อความนำหน้าปลั๊กอิน (ตั้งค่าใน config.yml)

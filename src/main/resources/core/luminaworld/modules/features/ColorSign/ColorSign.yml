# =========================================================================
# ColorSign (ระบบเขียนตัวอักษรสีบนป้ายข้อความ)
# คำอธิบาย: ระบบที่ปลดล็อกความสามารถในการจัดรูปแบบข้อความของป้าย (Signs) และป้ายแขวน (Hanging Signs)
# โดยผู้เล่นสามารถใช้สัญลักษณ์สีแบบดั้งเดิม (&a, &b), รหัสสี HEX (&#ff5555)
# หรือฟอร์แมต MiniMessage (<gradient:red:blue>) เพื่อเน้นความโดดเด่นของข้อความบนป้ายได้ทันทีเมื่อเขียนเสร็จ
# =========================================================================
settings:
  # การตั้งค่าพื้นฐานโมดูล
  enabled: true
  use-permission: false
  permission: "luminacore.feature.colorsign"

  # สวิตช์การปลดล็อกการจัดรูปแบบสี
  allow-hex: true # เปิด/ปิด การใช้รหัสสีแบบ Hex เช่น &#FF5555
  allow-minimessage: true # เปิด/ปิด การใช้สัญลักษณ์สีแบบ MiniMessage เช่น <gradient:red:blue>
  allow-legacy: true # เปิด/ปิด การใช้รหัสสีแบบดั้งเดิม เช่น &a, &l

  # การตั้งค่าเสียงเวลาทำงาน
  audio:
    enabled: true
    sound: "ENTITY_ITEM_FRAME_ADD_ITEM"
    volume: 1.0
    pitch: 1.2

  # รูปแบบการแจ้งเตือนข้อความ (message-style)
  # เลือกได้ 3 รูปแบบ:
  # - CHAT      : แสดงข้อความทางช่องพูดคุยปกติ
  # - ACTIONBAR : แสดงข้อความเหนือแถบทางลัดปุ่มไอเทม
  # - NONE      : ปิดการแจ้งเตือนทั้งหมดอย่างสมบูรณ์แบบ (จะไม่แสดงข้อความแจ้งเตือนเลย)
  message-style: "CHAT"

# ข้อความแจ้งเตือนต่างๆ (หลีกเลี่ยงการใช้อิโมจิ)
messages:
  formatted: "%prefix% &aจัดรูปแบบตัวอักษรบนป้ายข้อความสำเร็จแล้ว!"

# รายการตัวแปร (Placeholders) ที่ใช้ได้:
# %prefix% - คำนำหน้าปลั๊กอิน (จาก config.yml หลัก)

# =========================================================================
# ConfirmDrop (ระบบกั้นป้องกันการโยนไอเทมมีค่าทิ้งโดยไม่ได้ตั้งใจ)
# คำอธิบาย: ระบบนี้จะช่วยป้องกันการทำไอเทมสำคัญหลุดมือหรือโยนทิ้งโดยไม่ตั้งใจ 
# (เช่น อุปกรณ์ที่ผ่านการอัญเชิญมนต์สะกด, ปีก Elytra หรือไอเทมที่มีชื่อระบุไว้ในรายชื่อ protect-materials)
# เมื่อผู้เล่นกดปุ่มโยนไอเทม (ปุ่ม Q) ครั้งแรก:
# 1. ระบบจะขัดขวางและยกเลิกการทิ้งในทันที (ไอเทมยังคงอยู่ในตัวผู้เล่น)
# 2. ระบบจะส่งเสียงแจ้งเตือนพร้อมแสดงแถบเวลานับถอยหลัง (Progress Bar) บนหน้าจอของผู้เล่น
# 3. หากผู้เล่นต้องการทิ้งไอเทมดังกล่าวจริง ผู้เล่นจะต้องทำการ "กดย้ำทิ้งไอเทมตัวเดิมอีกครั้ง" ภายในวินาทีที่เหลืออยู่ (เช่น ภายใน 3 วินาที)
# 4. หากหมดเวลาหลอดนับถอยหลัง แถบแจ้งเตือนจะหายไปและระบบจะรีเซ็ตความปลอดภัยตามเดิม
# =========================================================================
settings:
  # การตั้งค่าพื้นฐานโมดูล
  enabled: true
  use-permission: false
  permission: "luminacore.feature.confirmdrop"
  
  # การตั้งค่าฟีเจอร์ป้องกันโยนไอเทมทิ้ง
  confirm-delay-seconds: 3.0 # เวลาจำกัดในการกดยืนยันการทิ้งซ้ำ (วินาที)
  protect-enchanted-only: true # ป้องกันเฉพาะไอเทมที่ตีบวก/มีมนต์สะกด (ยกเว้น Elytra ที่ป้องกันตลอดเวลา)

  # รายชื่อประเภทวัสดุที่ต้องการป้องกันเป็นพิเศษ แม้จะไม่ได้ตีบวกก็ตาม
  protect-materials:
    - "ELYTRA"
    - "NETHERITE_SWORD"
    - "NETHERITE_PICKAXE"
    - "NETHERITE_AXE"
    - "NETHERITE_SHOVEL"
    - "NETHERITE_HOE"
    - "DIAMOND_SWORD"
    - "DIAMOND_PICKAXE"

  # แถบความคืบหน้าการทิ้งไอเทม (Progress Bar)
  progress-bar:
    enabled: true
    char-completed: "|"
    char-remaining: "|"
    color-completed: "&c" # สีหลอดพลังเวลาส่วนที่ยังเหลือ (แสดงการแจ้งเตือน)
    color-remaining: "&7" # สีหลอดพลังส่วนที่ลดหายไปแล้ว
    color-bracket: "&e"
    color-number: "&b"
    color-text: "&7"
    format: "%color_text%(กดย้ำทิ้งไอเทม %item% อีกครั้งเพื่อยืนยัน) %color_number%%time% วินาที %color_bracket%[ %completed%%remaining% %color_bracket%]"

  # การตั้งค่าเสียงแจ้งเตือน
  audio:
    enabled: true
    
    # เสียงเตือนเมื่อกดทิ้งครั้งแรก
    warning-sound: "BLOCK_NOTE_BLOCK_BASS"
    warning-volume: 0.8
    warning-pitch: 0.5
    
    # เสียงเมื่อกดยืนยันการทิ้งสำเร็จ
    success-sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
    success-volume: 0.6
    success-pitch: 1.2

  # รูปแบบการแจ้งเตือนข้อความแจ้งผลลัพธ์ (message-style)
  # เลือกได้ 3 รูปแบบ:
  # - CHAT      : แสดงข้อความทางช่องพูดคุยปกติ
  # - ACTIONBAR : แสดงข้อความเหนือแถบทางลัดปุ่มไอเทม
  # - NONE      : ปิดการแจ้งเตือนทั้งหมดอย่างสมบูรณ์แบบ (จะไม่แสดงข้อความแจ้งเตือนเลย)
  message-style: "ACTIONBAR"

# รายการตัวแปร (Placeholders) ที่ใช้ได้ใน format หลอดความคืบหน้า:
# %completed% - หลอดเวลานับถอยหลังส่วนที่ยังเหลืออยู่
# %remaining% - หลอดเวลานับถอยหลังส่วนที่ผ่านไปแล้ว
# %time% - ตัวเลขวินาทีที่เหลือกดซ้ำ (มีทศนิยมหนึ่งตำแหน่ง)
# %item% - ชื่อของไอเทมที่มีค่าตัวที่พยายามโยนทิ้ง
# %prefix% - คำนำหน้าปลั๊กอิน (ตั้งค่าหลักใน config.yml)

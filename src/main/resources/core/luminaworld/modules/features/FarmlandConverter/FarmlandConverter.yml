# =========================================================================
# FarmlandConverter (ระบบแปลงดินเพาะปลูกกลับเป็นดินธรรมดา)
# คำอธิบาย: ระบบที่อำนวยความสะดวกในการจัดสรรและตกแต่งพื้นที่เพาะปลูก
# วิธีการใช้งาน: ถือจอบ (Hoe) ในมือหลักแล้วคลิกขวาที่บล็อกดินเพาะปลูก (Farmland)
# บล็อกดินเพาะปลูกดังกล่าวจะแปลงสภาพกลับมาเป็นดินธรรมดา (Dirt) หรือตามตั้งค่าในทันที
# โดยจะลดความทนทานของจอบตามความเหมาะสม พร้อมแสดงเอฟเฟกต์ฝุ่นดินกระจายและเสียงดึงหน้าดิน
# =========================================================================
settings:
  enabled: true
  use-permission: true
  permission: "luminacore.feature.farmlandconverter"
  # รูปแบบการแจ้งเตือนข้อความ (message-style)
  # เลือกได้ 3 รูปแบบ:
  # - CHAT      : แสดงข้อความทางช่องพูดคุยปกติ
  # - ACTIONBAR : แสดงข้อความเหนือแถบทางลัดปุ่มไอเทม
  # - NONE      : ปิดการแจ้งเตือนทั้งหมดอย่างสมบูรณ์แบบ (จะไม่แสดงข้อความแจ้งเตือนเลย)
  message-style: "ACTIONBAR"

  to-material: "DIRT" # บล็อกดินปลายทางที่จะได้รับหลังจากแปลง (เช่น DIRT หรือ COARSE_DIRT)
  durability-cost: 1 # ค่าความทนทานจอบที่สูญเสียไปต่อครั้ง (คิดผลของยศ Unbreaking)

  particles:
    enabled: true
    type: "BLOCK" # เอฟเฟกต์ดินฝุ่นกระจาย
    count: 12
    speed: 0.05

  audio:
    enabled: true
    sound: "BLOCK_GRAVEL_BREAK" # เสียงดึงหน้าดิน
    volume: 0.8
    pitch: 0.9

messages:
  converted: "%prefix% &aแปลงดินเพาะปลูกกลับเป็นบล็อกดินเรียบร้อยแล้ว!"

# รายการตัวแปร (Placeholders) ที่ใช้ได้:
# %prefix% - คำนำหน้าปลั๊กอิน

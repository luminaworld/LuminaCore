# =========================================================================
# PathConverter (ระบบแปลงทางเดินดินกลับเป็นดินธรรมดา)
# คำอธิบาย: ระบบที่เพิ่มความสะดวกในการตกแต่ง จัดการทางเดิน และตกแต่งภูมิประเทศในเมือง/บ้าน
# วิธีการใช้งาน: ถือพลั่ว (Shovel) ในมือหลักแล้วคลิกขวาที่บล็อกทางเดินดิน (Dirt Path)
# บล็อกทางเดินดินดังกล่าวจะแปลงสภาพกลับมาเป็นดินธรรมดา (Dirt) หรือตามตั้งค่าในทันที
# โดยจะลดความทนทานของพลั่วตามความเหมาะสม พร้อมแสดงเอฟเฟกต์ฝุ่นดินกระเซ็นและเสียงขูดดิน
# =========================================================================
settings:
  enabled: true
  use-permission: true
  permission: "luminacore.feature.pathconverter"
  # รูปแบบการแจ้งเตือนข้อความ (message-style)
  # เลือกได้ 3 รูปแบบ:
  # - CHAT      : แสดงข้อความทางช่องพูดคุยปกติ
  # - ACTIONBAR : แสดงข้อความเหนือแถบทางลัดปุ่มไอเทม
  # - NONE      : ปิดการแจ้งเตือนทั้งหมดอย่างสมบูรณ์แบบ (จะไม่แสดงข้อความแจ้งเตือนเลย)
  message-style: "ACTIONBAR"

  to-material: "DIRT" # บล็อกที่จะได้รับหลังจากแปลง (เช่น DIRT หรือ COARSE_DIRT)
  durability-cost: 1 # ค่าความทนทานพลั่วที่เสียไป (คิดร่วมกับระดับของ Unbreaking)

  particles:
    enabled: true
    type: "BLOCK" # เอฟเฟกต์ดินกระเซ็น
    count: 12
    speed: 0.05

  audio:
    enabled: true
    sound: "BLOCK_GRAVEL_BREAK" # เสียงขูดดิน
    volume: 0.8
    pitch: 1.0

messages:
  converted: "%prefix% &aแปลงบล็อกทางเดินดินกลับเป็นบล็อกดินเรียบร้อยแล้ว!"

# รายการตัวแปร (Placeholders) ที่ใช้ได้:
# %prefix% - คำนำหน้าปลั๊กอิน

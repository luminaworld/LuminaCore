# =========================================================================
# CreativeMonitor (ระบบเฝ้าระวังและแจ้งเตือนผู้เล่นโหมดสร้างสรรค์ - Creative)
# คำอธิบาย: ระบบความปลอดภัยสำหรับตรวจสอบผู้เล่นที่อยู่ในโหมดสร้างสรรค์ (Creative Mode)
# โดยระบบจะตรวจหาการดึงไอเทมออกมาใช้งาน หรือการโยนไอเทมดรอปจากโหมดสร้างสรรค์
# และทำการรายงานแจ้งเตือนไปที่ Discord Webhook (สามารถกำหนดช่องแยกเฉพาะได้ในไฟล์นี้)
# เพื่อป้องกันการทุจริต การปั๊มไอเทม หรือการสปอนสิ่งของแจกจ่ายให้ผู้เล่นอื่นโดยมิชอบ
# =========================================================================
settings:
  enabled: true
  
  # คูลดาวน์ระหว่างส่งรายงานการแจ้งเตือนต่อผู้เล่น 1 คน (วินาที)
  cooldown: 3

  # เปิด/ปิด การตรวจจับเฉพาะแบบ
  track-item-obtain: true
  track-item-drop: true

  # ลิงก์ Discord Webhook เฉพาะของระบบเฝ้าระวัง Creative
  # (หากปล่อยว่างไว้ จะกลับไปใช้ Webhook URL หลักที่ระบุใน config.yml)
  discord-webhook-url: ""

# รูปแบบของข้อความรายงานการแจ้งเตือน ตัวเลือก: Embed1 (รายละเอียดเต็ม), Embed2 (ย่อส่วน), normal (ข้อความดิบ)
messages: "Embed1"

# Creative Obtain Notification
ObtainEmbed:
  content: ""
  setTitle: "%prefix% Creative Item Obtained"
  setDescription: "A player in creative mode spawned an item."
  setColor: 3447003  # Blue (decimal color code)
  setThumbnail: "%player_avatar%"
  setTimestamp: true
  setFooter: "LuminaCore Creative Monitor"
  fields:
    field1:
      name: "Player"
      value: "%player_name%"
      inline: true
    field2:
      name: "Item Obtained"
      value: "%item_type% (x%item_amount%)"
      inline: true
    field3:
      name: "Location"
      value: "X: %player_x% Y: %player_y% Z: %player_z%"
      inline: true

# Creative Drop Notification
DropEmbed:
  content: ""
  setTitle: "%prefix% Creative Item Dropped"
  setDescription: "A player in creative mode dropped an item."
  setColor: 15158332  # Red
  setThumbnail: "%player_avatar%"
  setTimestamp: true
  setFooter: "LuminaCore Creative Monitor"
  fields:
    field1:
      name: "Player"
      value: "%player_name%"
      inline: true
    field2:
      name: "Item Dropped"
      value: "%item_type% (x%item_amount%)"
      inline: true
    field3:
      name: "Location"
      value: "X: %block_x% Y: %block_y% Z: %block_z%"
      inline: true

normal:
  obtain: "%prefix% Player %player_name% spawned %item_type% (x%item_amount%) in Creative Mode at %time%"
  drop: "%prefix% Player %player_name% dropped %item_type% (x%item_amount%) in Creative Mode at %block_x%, %block_y%, %block_z% in world %world_name% at %time%"

# =========================================================================
# CreativeMonitor (ระบบเฝ้าระวังและแจ้งเตือนผู้เล่นโหมดสร้างสรรค์ - Creative)
# คำอธิบาย: ระบบความปลอดภัยสำหรับตรวจสอบผู้เล่นที่อยู่ในโหมดสร้างสรรค์ (Creative Mode)
# โดยระบบจะตรวจหาการดึงไอเทมออกมาใช้งาน หรือการโยนไอเทมดรอปจากโหมดสร้างสรรค์
# และทำการรายงานแจ้งเตือนไปที่ Discord Webhook (สามารถกำหนดช่องแยกเฉพาะได้ในไฟล์นี้)
# เพื่อป้องกันการทุจริต การปั๊มไอเทม หรือการสปอนสิ่งของแจกจ่ายให้ผู้เล่นอื่นโดยมิชอบ
# =========================================================================
settings:
  # การตั้งค่าพื้นฐานโมดูล
  enabled: true
  
  # คูลดาวน์ระหว่างส่งรายงานการแจ้งเตือนต่อผู้เล่น 1 คน (วินาที)
  cooldown: 3

  # เปิด/ปิด การตรวจจับเฉพาะแบบ
  track-item-obtain: true
  track-item-drop: true

  # ลิงก์ Discord Webhook เฉพาะของระบบเฝ้าระวัง Creative
  # (หากปล่อยว่างไว้ จะกลับไปใช้ Webhook URL หลักที่ระบุใน config.yml)
  discord-webhook-url: ""

# รูปแบบของข้อความรายงานการแจ้งเตือน ตัวเลือก: Embed1 (รายละเอียดเต็ม), Embed2 (ย่อส่วน), normal (ข้อความดิบ)
messages: "Embed1"

# รายละเอียด Discord Webhook ตอนเสกไอเทมจาก Creative (Obtain)
ObtainEmbed:
  content: ""
  setTitle: "%prefix% ตรวจพบการดึงไอเทมจากโหมด Creative"
  setDescription: "มีผู้เล่นในโหมดสร้างสรรค์ทำการเลือก/ดึงไอเทมออกจากช่องสร้างสรรค์"
  setColor: 3447003  # สีน้ำเงิน
  setThumbnail: "%player_avatar%"
  setTimestamp: true
  setFooter: "ระบบเฝ้าระวังโหมดสร้างสรรค์ LuminaCore"
  fields:
    field1:
      name: "ผู้เล่น"
      value: "%player_name%"
      inline: true
    field2:
      name: "ไอเทมที่ได้รับ"
      value: "%item_type% (จำนวน x%item_amount%)"
      inline: true
    field3:
      name: "พิกัดผู้เล่น"
      value: "X: %player_x% Y: %player_y% Z: %player_z%"
      inline: true

# รายละเอียด Discord Webhook ตอนโยนไอเทมทิ้งจาก Creative (Drop)
DropEmbed:
  content: ""
  setTitle: "%prefix% ตรวจพบการโยนไอเทมในโหมด Creative"
  setDescription: "มีผู้เล่นในโหมดสร้างสรรค์ทำการโยน/ทิ้งไอเทมลงสู่พื้นโลก"
  setColor: 15158332  # สีแดง
  setThumbnail: "%player_avatar%"
  setTimestamp: true
  setFooter: "ระบบเฝ้าระวังโหมดสร้างสรรค์ LuminaCore"
  fields:
    field1:
      name: "ผู้เล่น"
      value: "%player_name%"
      inline: true
    field2:
      name: "ไอเทมที่โยน"
      value: "%item_type% (จำนวน x%item_amount%)"
      inline: true
    field3:
      name: "พิกัดที่โยน"
      value: "X: %block_x% Y: %block_y% Z: %block_z%"
      inline: true

# รูปแบบข้อความแบบปกติ (Plain Discord Message)
normal:
  obtain: "%prefix% ผู้เล่น %player_name% ได้หยิบ/เสกไอเทม %item_type% (จำนวน x%item_amount%) จากโหมด Creative ที่เวลา %time%"
  drop: "%prefix% ผู้เล่น %player_name% ได้โยนไอเทม %item_type% (จำนวน x%item_amount%) จากโหมด Creative ที่พิกัด X=%block_x%, Y=%block_y%, Z=%block_z% ในโลก %world_name% เวลา %time%"

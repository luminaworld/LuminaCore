# =========================================================================
# RconMonitor (ระบบเฝ้าระวังและตรวจสอบการเชื่อมต่อ RCON)
# คำอธิบาย: ระบบความปลอดภัยขั้นสูงสำหรับดูแลความปลอดภัยของเซิร์ฟเวอร์
# โดยจะทำการเฝ้าระวังและดักฟังการล็อกอินเข้าสู่ระบบ RCON (Remote Console) จากภายนอก
# รวมถึงตรวจสอบคำสั่งต่างๆ ที่สั่งรันผ่าน RCON และทำรายงานส่งตรงไปที่ Discord Webhook ทันที
# เพื่อป้องกันการแฮกหรือควบคุมเซิร์ฟเวอร์โดยผู้ไม่หวังดี
# =========================================================================
settings:
  enabled: true
  
  # ส่งรายงานไป Discord ทันทีเมื่อมีการล็อกอินเข้า RCON
  notify-login: true
  
  # ส่งรายงานไป Discord ทันทีเมื่อมีการใช้คำสั่งผ่าน RCON
  notify-command: true
  
  # ลิงก์ Discord Webhook เฉพาะสำหรับการเฝ้าระวัง RCON
  # (หากปล่อยว่างไว้ จะกลับไปใช้ Webhook URL หลักที่ระบุใน config.yml)
  discord-webhook-url: ""
  
  # ข้อความเตือนที่แสดงบนหน้าจอคอนโซลเซิร์ฟเวอร์
  console-warning: "[LuminaCore] RCON Login detected from IP: %ip%"

# When someone logs into RCON
LoginEmbed:
  setTitle: "RCON Login Detected"
  setDescription: "A new RCON connection has been established to the server."
  setColor: 15158332  # Red (decimal color code)
  setTimestamp: true
  setFooter: "LuminaCore RCON Monitor"
  fields:
    field1:
      name: "IP Address"
      value: "%ip%"
      inline: false
    field2:
      name: "Time"
      value: "%time%"
      inline: false

# When a command is run via RCON
CommandEmbed:
  setTitle: "RCON Command Executed"
  setDescription: "A command was executed via RCON."
  setColor: 15158332  # Red
  setTimestamp: true
  setFooter: "LuminaCore RCON Monitor"
  fields:
    field1:
      name: "Command Executed"
      value: "```%command%```"
      inline: false
    field2:
      name: "Time"
      value: "%time%"
      inline: false

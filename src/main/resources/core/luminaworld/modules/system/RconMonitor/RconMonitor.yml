# =========================================================================
# RconMonitor (ระบบเฝ้าระวังและตรวจสอบการเชื่อมต่อ RCON)
# คำอธิบาย: ระบบความปลอดภัยขั้นสูงสำหรับดูแลความปลอดภัยของเซิร์ฟเวอร์
# โดยจะทำการเฝ้าระวังและดักฟังการล็อกอินเข้าสู่ระบบ RCON (Remote Console) จากภายนอก
# รวมถึงตรวจสอบคำสั่งต่างๆ ที่สั่งรันผ่าน RCON และทำรายงานส่งตรงไปที่ Discord Webhook ทันที
# เพื่อป้องกันการแฮกหรือควบคุมเซิร์ฟเวอร์โดยผู้ไม่หวังดี
# =========================================================================
settings:
  # การตั้งค่าพื้นฐานโมดูล
  enabled: true
  
  # การตั้งค่าฟีเจอร์ RCON Monitor
  notify-login: true # ส่งรายงานไป Discord ทันทีเมื่อมีการล็อกอินเข้า RCON
  notify-command: true # ส่งรายงานไป Discord ทันทีเมื่อมีการใช้คำสั่งผ่าน RCON
  
  # ลิงก์ Discord Webhook เฉพาะสำหรับการเฝ้าระวัง RCON
  # (หากปล่อยว่างไว้ จะกลับไปใช้ Webhook URL หลักที่ระบุใน config.yml)
  discord-webhook-url: ""
  
  # ข้อความเตือนที่แสดงบนหน้าจอคอนโซลเซิร์ฟเวอร์
  console-warning: "[LuminaCore] ตรวจพบการเข้าสู่ระบบ RCON จาก IP: %ip%"

# เมื่อมีคนเข้าสู่ระบบ RCON (Login)
LoginEmbed:
  setTitle: "ตรวจพบการเข้าสู่ระบบ RCON"
  setDescription: "มีการเชื่อมต่อ RCON (Remote Console) เข้ามายังเซิร์ฟเวอร์จากภายนอก"
  setColor: 15158332  # สีแดง
  setTimestamp: true
  setFooter: "ระบบเฝ้าระวัง RCON LuminaCore"
  fields:
    field1:
      name: "ที่อยู่ IP"
      value: "%ip%"
      inline: false
    field2:
      name: "เวลา"
      value: "%time%"
      inline: false

# เมื่อมีการสั่งการคำสั่งผ่าน RCON (Command Run)
CommandEmbed:
  setTitle: "มีการใช้งานคำสั่งผ่าน RCON"
  setDescription: "มีการป้อนคำสั่งเข้ามาทำงานในระบบผ่านการเชื่อมต่อ RCON"
  setColor: 15158332  # สีแดง
  setTimestamp: true
  setFooter: "ระบบเฝ้าระวัง RCON LuminaCore"
  fields:
    field1:
      name: "คำสั่งที่ทำงาน"
      value: "```%command%```"
      inline: false
    field2:
      name: "เวลา"
      value: "%time%"
      inline: false

# =========================================================================
# UnknownCommand (ระบบตรวจจับคำสั่งต้องสงสัยและคำสั่งที่ไม่มีจริง)
# คำอธิบาย: ระบบตรวจสอบความปลอดภัยที่จะคอยดักจับการพิมพ์คำสั่งที่ไม่มีอยู่จริงบนเซิร์ฟเวอร์
# (Unknown Command) หรือการรันคำสั่งสำคัญที่เป็นความลับ/อันตรายที่ระบุไว้ใน monitored-commands
# (เช่น /op, /gamemode, /stop, /plugman) เพื่อแจ้งเตือนการโจมตีหรือการลองรันคำสั่งแฮก
# ของผู้เล่นที่ไม่มีสิทธิ์ ส่งตรงไปยังระบบ Discord Webhook ทันที
# =========================================================================
settings:
  # การตั้งค่าพื้นฐานโมดูล
  enabled: true
  
  # คูลดาวน์ระหว่างส่งรายงานการแจ้งเตือนต่อผู้เล่น 1 คน (วินาที)
  cooldown: 3

# คำสั่งที่ระบบจะไม่แจ้งเตือน (แม้จะพิมพ์แบบไม่มีคำสั่งนั้นจริงใน Spigot)
ignored-commands:
  - "/help"
  - "/?"
  - "/list"
  - "/who"
  - "/spawn"
  - "/home"
  - "/back"
  - "/tpa"
  - "/tpaccept"
  - "/tpdeny"
  - "/msg"
  - "/tell"
  - "/whisper"
  - "/r"
  - "/reply"

# คำสั่งที่ต้องการเฝ้าระวังเป็นพิเศษ (พยายามรันคำสั่งเหล่านี้แม้จะมีอยู่จริงและได้รับอนุญาต/หรือไม่มีก็ตาม จะแจ้งเตือนทันที)
monitored-commands:
  - "/op"
  - "/deop"
  - "/gamemode"
  - "/gm"
  - "/stop"
  - "/reload"
  - "/rl"
  - "/plugman"

# รูปแบบของข้อความรายงานที่จะใช้บน Discord. ตัวเลือก: Embed1 (รายละเอียดเต็ม), Embed2 (ย่อส่วน), normal (ข้อความดิบ)
messages: "Embed1"

# รายละเอียด Discord Webhook Embed 1 (โครงสร้างข้อความแบบเต็ม)
Embed1:
  content: ""
  setTitle: "%prefix% ตรวจพบเหตุการณ์ใช้คำสั่งต้องสงสัย"
  setDescription: "ระบบได้ทำการระงับและตรวจพบความพยายามในการใช้คำสั่งต้องสงสัยในเซิร์ฟเวอร์"
  setColor: 15158332  # สีแดง
  setThumbnail: "%player_avatar%"
  setTimestamp: true
  setFooter: "ระบบตรวจจับคำสั่ง LuminaCore"
  fields:
    field1:
      name: "ผู้เล่น"
      value: "%player_name%"
      inline: false
    field2:
      name: "คำสั่งที่ป้อน"
      value: "`%command%`"
      inline: true
    field3:
      name: "ประเภทของเหตุการณ์"
      value: "%detector_type%"
      inline: true
    field4:
      name: "เซิร์ฟเวอร์"
      value: "%server_name%"
      inline: true
    field5:
      name: "เวลา"
      value: "%time%"
      inline: false

# รายละเอียด Discord Webhook Embed 2 (โครงสร้างข้อความแบบย่อ)
Embed2:
  setTitle: "%prefix% %player_name% พิมพ์คำสั่งต้องสงสัย"
  setColor: 16776960  # สีเหลือง
  setThumbnail: "%player_avatar%"
  setTimestamp: true
  fields:
    field1:
      name: "คำสั่ง"
      value: "`%command%`"
      inline: true
    field2:
      name: "ประเภท"
      value: "%detector_type%"
      inline: true
    field3:
      name: "เวลา"
      value: "%time%"
      inline: true

# รูปแบบข้อความแบบปกติ (Plain Discord Message)
normal:
  content: "%prefix% ผู้เล่น %player_name% ได้พยายามพิมพ์คำสั่งต้องสงสัย: %command% (%detector_type%) ที่เวลา %time%"
